<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>A股新闻热度研判台</title>
    <style>
:root {
  color-scheme: light;
  --bg: #f5f7fa;
  --panel: #ffffff;
  --panel-soft: #eef3f8;
  --ink: #16202a;
  --muted: #687684;
  --line: #dce3ea;
  --blue: #1967d2;
  --green: #168257;
  --red: #c24136;
  --amber: #b16900;
  --cyan: #087e8b;
  --shadow: 0 18px 45px rgba(30, 45, 62, 0.1);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  background:
    linear-gradient(180deg, rgba(25, 103, 210, 0.08), transparent 260px),
    var(--bg);
  color: var(--ink);
  font-family:
    Inter, "Segoe UI", "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
}

button,
input,
textarea {
  font: inherit;
}

button {
  border: 0;
  cursor: pointer;
}

svg {
  width: 18px;
  height: 18px;
  stroke: currentColor;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
  fill: none;
  flex: 0 0 auto;
}

.svg-sprite {
  position: absolute;
  width: 0;
  height: 0;
  overflow: hidden;
}

.app {
  width: min(1540px, calc(100% - 32px));
  margin: 0 auto;
  padding: 24px 0 36px;
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
  padding: 12px 0 22px;
}

.eyebrow {
  margin: 0 0 6px;
  color: var(--muted);
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 0;
  text-transform: uppercase;
}

h1,
h2 {
  margin: 0;
  letter-spacing: 0;
}

h1 {
  font-size: clamp(28px, 4vw, 44px);
  line-height: 1.05;
}

h2 {
  font-size: 18px;
  line-height: 1.2;
}

.top-actions {
  display: flex;
  align-items: center;
  gap: 12px;
}

.date-line {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 12px;
  color: var(--muted);
  font-size: 13px;
  font-weight: 800;
}

.date-line span {
  display: inline-flex;
  align-items: center;
  min-height: 28px;
  padding: 0 9px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.72);
}

.date-line span:last-child {
  color: var(--blue);
}

.risk-note,
.date-input,
.search-box {
  min-height: 40px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.86);
}

.risk-note {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 0 12px;
  color: var(--red);
  font-weight: 800;
}

.date-input {
  padding: 0 12px;
  color: var(--ink);
}

.workspace {
  display: grid;
  grid-template-columns: minmax(320px, 420px) minmax(0, 1fr);
  gap: 18px;
  align-items: start;
}

.input-panel,
.panel,
.score-card {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.94);
  box-shadow: var(--shadow);
}

.input-panel {
  position: sticky;
  top: 16px;
  padding: 18px;
}

.hidden-controls {
  display: none;
}

.section-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  margin-bottom: 16px;
}

.section-head.compact {
  margin-bottom: 12px;
}

.icon-btn,
.ghost-btn,
.secondary-btn,
.primary-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  min-height: 42px;
  border-radius: 8px;
  transition:
    transform 0.15s ease,
    background 0.15s ease,
    border-color 0.15s ease;
}

.icon-btn,
.ghost-btn {
  width: 42px;
  border: 1px solid var(--line);
  background: var(--panel);
  color: var(--ink);
}

.primary-btn {
  flex: 1;
  padding: 0 18px;
  background: var(--ink);
  color: #fff;
  font-weight: 800;
}

.secondary-btn {
  padding: 0 14px;
  border: 1px solid rgba(25, 103, 210, 0.28);
  background: rgba(25, 103, 210, 0.09);
  color: var(--blue);
  font-weight: 900;
  white-space: nowrap;
}

.icon-btn:hover,
.ghost-btn:hover,
.secondary-btn:hover,
.primary-btn:hover {
  transform: translateY(-1px);
}

.secondary-btn:disabled {
  cursor: wait;
  opacity: 0.66;
  transform: none;
}

.source-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 8px;
  margin-bottom: 14px;
}

.source-tile {
  display: flex;
  align-items: center;
  gap: 8px;
  min-height: 42px;
  padding: 9px 10px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fff;
  color: var(--muted);
  font-size: 13px;
  font-weight: 800;
}

.source-tile input {
  width: 16px;
  height: 16px;
  accent-color: var(--blue);
}

.source-tile:has(input:checked) {
  border-color: rgba(25, 103, 210, 0.42);
  background: rgba(25, 103, 210, 0.08);
  color: var(--blue);
}

.field-label {
  display: block;
  margin: 8px 0 8px;
  color: var(--muted);
  font-size: 13px;
  font-weight: 800;
}

textarea {
  width: 100%;
  min-height: 420px;
  resize: vertical;
  padding: 14px;
  border: 1px solid var(--line);
  border-radius: 8px;
  outline: 0;
  background: #fbfcfd;
  color: var(--ink);
  line-height: 1.62;
}

textarea:focus,
.search-box:focus-within,
.date-input:focus {
  border-color: rgba(25, 103, 210, 0.7);
  box-shadow: 0 0 0 3px rgba(25, 103, 210, 0.12);
}

.button-row {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}

.dashboard {
  display: grid;
  gap: 18px;
}

.score-strip {
  display: grid;
  grid-template-columns: 1.25fr repeat(3, minmax(150px, 0.55fr));
  gap: 12px;
}

.score-card {
  padding: 16px;
  min-height: 154px;
}

.card-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  color: var(--muted);
  font-size: 13px;
  font-weight: 900;
}

.card-head svg {
  color: var(--blue);
}

.meter {
  position: relative;
  display: grid;
  place-items: center;
  height: 112px;
  margin-top: 6px;
  border-radius: 8px;
  background:
    conic-gradient(from 225deg, var(--red), var(--amber), var(--green), transparent 0 360deg),
    #eef2f6;
  clip-path: polygon(0 100%, 0 0, 100% 0, 100% 100%);
  overflow: hidden;
}

.meter::after {
  content: "";
  position: absolute;
  inset: 18px 24px 0;
  border-radius: 8px 8px 0 0;
  background: var(--panel);
}

.meter-needle {
  position: absolute;
  z-index: 2;
  bottom: 16px;
  left: 50%;
  width: 3px;
  height: 72px;
  background: var(--ink);
  transform: translateX(-50%) rotate(-54deg);
  transform-origin: bottom center;
  border-radius: 3px;
  transition: transform 0.35s ease;
}

.meter-core {
  position: relative;
  z-index: 3;
  display: grid;
  place-items: center;
  align-self: end;
  min-width: 112px;
  padding: 11px 14px;
  margin-bottom: 12px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fff;
}

.meter-core strong {
  font-size: 34px;
  line-height: 1;
}

.meter-core span {
  margin-top: 4px;
  color: var(--muted);
  font-size: 12px;
  font-weight: 800;
}

.summary-line {
  min-height: 22px;
  margin-top: 10px;
  color: var(--muted);
  font-size: 13px;
  line-height: 1.45;
}

.prob-bar {
  height: 10px;
  margin: 25px 0 14px;
  border-radius: 999px;
  background: #e9eef4;
  overflow: hidden;
}

.prob-bar span {
  display: block;
  width: 0;
  height: 100%;
  border-radius: inherit;
  background: var(--green);
  transition: width 0.35s ease;
}

.prob-bar.neutral span {
  background: var(--blue);
}

.prob-bar.risk span {
  background: var(--red);
}

.score-card p {
  margin: 0;
  color: var(--muted);
  font-size: 13px;
  line-height: 1.45;
}

.grid-two {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 18px;
}

.panel {
  padding: 18px;
}

.sector-bars {
  display: grid;
  gap: 10px;
}

.sector-row {
  display: grid;
  grid-template-columns: minmax(72px, 108px) minmax(0, 1fr) 44px;
  align-items: center;
  gap: 10px;
  min-height: 32px;
}

.sector-name {
  overflow: hidden;
  color: var(--ink);
  font-size: 13px;
  font-weight: 900;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.bar-track {
  height: 12px;
  border-radius: 999px;
  background: #e9eef4;
  overflow: hidden;
}

.bar-fill {
  display: block;
  width: 0;
  height: 100%;
  border-radius: inherit;
  background: linear-gradient(90deg, var(--cyan), var(--blue));
}

.sector-score {
  color: var(--muted);
  font-size: 12px;
  font-weight: 900;
  text-align: right;
}

.topic-list {
  display: grid;
  gap: 10px;
  max-height: 306px;
  overflow: auto;
  padding-right: 4px;
}

.main-topic-list {
  max-height: calc(100vh - 168px);
  min-height: 520px;
}

.topic-item {
  display: grid;
  grid-template-columns: 8px 1fr auto;
  gap: 10px;
  align-items: start;
  padding: 11px 0;
  border-bottom: 1px solid var(--line);
}

.topic-dot {
  width: 8px;
  height: 8px;
  margin-top: 7px;
  border-radius: 50%;
  background: var(--blue);
}

.topic-item strong {
  display: block;
  margin-bottom: 5px;
  font-size: 14px;
  line-height: 1.35;
}

.source-mark {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 17px;
  height: 17px;
  margin-left: 6px;
  border: 1px solid rgba(25, 103, 210, 0.35);
  border-radius: 50%;
  background: #fff;
  color: var(--blue);
  cursor: pointer;
  padding: 0;
  font-size: 11px;
  font-weight: 900;
  line-height: 1;
  text-decoration: none;
  vertical-align: text-top;
}

.source-mark:hover {
  background: rgba(25, 103, 210, 0.1);
}

.report-list {
  display: grid;
  gap: 10px;
  max-height: 306px;
  overflow: auto;
  padding-right: 4px;
}

.report-item {
  padding: 12px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fbfcfd;
}

.report-topline,
.report-meta {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 8px;
}

.report-topline {
  justify-content: space-between;
}

.report-actions {
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.report-topline strong {
  font-size: 14px;
}

.report-topline span,
.report-meta span {
  color: var(--muted);
  font-size: 12px;
  font-weight: 900;
}

.report-link {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 19px;
  height: 19px;
  border: 1px solid rgba(25, 103, 210, 0.35);
  border-radius: 50%;
  background: #fff;
  color: var(--blue);
  font-size: 11px;
  font-weight: 900;
  line-height: 1;
  text-decoration: none;
}

.report-link:hover {
  background: rgba(25, 103, 210, 0.1);
}

.report-item h3 {
  margin: 8px 0;
  color: var(--ink);
  font-size: 14px;
  line-height: 1.35;
}

.report-item p {
  margin: 8px 0 0;
  color: var(--muted);
  font-size: 13px;
  line-height: 1.5;
}

.topic-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
}

.topic-item span,
.chip {
  color: var(--muted);
  font-size: 12px;
  font-weight: 800;
}

.chip {
  padding: 5px 8px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: var(--panel-soft);
  white-space: nowrap;
}

.search-box {
  display: flex;
  align-items: center;
  gap: 8px;
  width: min(310px, 44vw);
  padding: 0 11px;
}

.search-box input {
  width: 100%;
  border: 0;
  outline: 0;
  background: transparent;
  color: var(--ink);
}

.table-wrap {
  overflow: auto;
  border: 1px solid var(--line);
  border-radius: 8px;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 880px;
}

th,
td {
  padding: 13px 14px;
  border-bottom: 1px solid var(--line);
  text-align: left;
  vertical-align: top;
}

th {
  position: sticky;
  top: 0;
  z-index: 1;
  background: #f7fafc;
  color: var(--muted);
  font-size: 12px;
  font-weight: 900;
}

td {
  font-size: 13px;
  line-height: 1.55;
}

tbody tr:last-child td {
  border-bottom: 0;
}

.stock-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.stock-tag {
  padding: 5px 8px;
  border-radius: 999px;
  background: rgba(25, 103, 210, 0.08);
  color: var(--blue);
  font-size: 12px;
  font-weight: 900;
}

.plan-box,
.risk-list {
  display: grid;
  gap: 10px;
}

.plan-item,
.risk-item {
  padding: 12px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fbfcfd;
}

.plan-item strong,
.risk-item strong {
  display: block;
  margin-bottom: 6px;
  font-size: 14px;
}

.plan-item span,
.risk-item span {
  color: var(--muted);
  font-size: 13px;
  line-height: 1.45;
}

.empty {
  padding: 22px;
  border: 1px dashed var(--line);
  border-radius: 8px;
  color: var(--muted);
  text-align: center;
}

@media (max-width: 1180px) {
  .workspace,
  .score-strip {
    grid-template-columns: 1fr;
  }

  .input-panel {
    position: static;
  }

  textarea {
    min-height: 280px;
  }
}

@media (max-width: 760px) {
  .app {
    width: min(100% - 20px, 1540px);
    padding-top: 12px;
  }

  .topbar,
  .top-actions,
  .section-head {
    align-items: stretch;
    flex-direction: column;
  }

  .top-actions {
    gap: 8px;
  }

  .grid-two,
  .source-grid {
    grid-template-columns: 1fr;
  }

  .search-box {
    width: 100%;
  }

  .sector-row {
    grid-template-columns: 92px minmax(0, 1fr) 38px;
  }
}

    </style>
  </head>
  <body>
    <svg class="svg-sprite" aria-hidden="true">
      <symbol id="i-pulse" viewBox="0 0 24 24">
        <path d="M3 12h4l2-6 4 12 3-7h5" />
      </symbol>
      <symbol id="i-play" viewBox="0 0 24 24">
        <path d="M8 5v14l11-7z" />
      </symbol>
      <symbol id="i-file" viewBox="0 0 24 24">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
        <path d="M14 2v6h6" />
      </symbol>
      <symbol id="i-trash" viewBox="0 0 24 24">
        <path d="M3 6h18" />
        <path d="M8 6V4h8v2" />
        <path d="M6 6l1 16h10l1-16" />
      </symbol>
      <symbol id="i-download" viewBox="0 0 24 24">
        <path d="M12 3v12" />
        <path d="M7 10l5 5 5-5" />
        <path d="M5 21h14" />
      </symbol>
      <symbol id="i-shield" viewBox="0 0 24 24">
        <path d="M12 3 5 6v6c0 4.4 2.8 7.7 7 9 4.2-1.3 7-4.6 7-9V6z" />
      </symbol>
      <symbol id="i-search" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="7" />
        <path d="m16 16 5 5" />
      </symbol>
    </svg>

    <div class="app">
      <header class="topbar">
        <div>
          <p class="eyebrow">China News Market Intelligence</p>
          <h1>A股新闻热度研判台</h1>
          <div class="date-line">
            <span id="dateDisplay">--</span>
            <span id="updateStatus">等待更新</span>
          </div>
        </div>
        <div class="top-actions">
          <div class="risk-note">
            <svg><use href="#i-shield"></use></svg>
            非投资建议
          </div>
          <input id="tradeDate" class="date-input" type="date" />
          <button id="onlineBtn" class="secondary-btn">
            <svg><use href="#i-download"></use></svg>
            联网更新
          </button>
        </div>
      </header>

      <main class="workspace">
        <section class="input-panel">
          <div class="section-head">
            <div>
              <p class="eyebrow">Daily Hotspots</p>
              <h2>新闻热点</h2>
            </div>
          </div>

          <div id="hotTopics" class="topic-list main-topic-list"></div>

          <div class="hidden-controls" aria-hidden="true">
            <div id="sourceGrid" class="source-grid" aria-label="新闻源"></div>
            <textarea id="newsInput" spellcheck="false"></textarea>
            <button id="sampleBtn" type="button"></button>
            <button id="clearBtn" type="button"></button>
            <button id="exportBtn" type="button"></button>
            <button id="analyzeBtn" class="primary-btn">
              <svg><use href="#i-play"></use></svg>
              开始研判
            </button>
          </div>
        </section>

        <section class="dashboard">
          <div class="score-strip">
            <article class="score-card wide">
              <div class="card-head">
                <span>次日市场温度</span>
                <svg><use href="#i-pulse"></use></svg>
              </div>
              <div class="meter">
                <div id="meterNeedle" class="meter-needle"></div>
                <div class="meter-core">
                  <strong id="marketScore">--</strong>
                  <span id="marketTone">等待研判</span>
                </div>
              </div>
              <div id="marketSummary" class="summary-line">导入新闻后生成情景判断。</div>
            </article>

            <article class="score-card">
              <div class="card-head"><span>上涨</span><span id="upProb">--</span></div>
              <div class="prob-bar"><span id="upBar"></span></div>
              <p id="upText">--</p>
            </article>
            <article class="score-card">
              <div class="card-head"><span>震荡</span><span id="flatProb">--</span></div>
              <div class="prob-bar neutral"><span id="flatBar"></span></div>
              <p id="flatText">--</p>
            </article>
            <article class="score-card">
              <div class="card-head"><span>回撤</span><span id="downProb">--</span></div>
              <div class="prob-bar risk"><span id="downBar"></span></div>
              <p id="downText">--</p>
            </article>
          </div>

          <div class="grid-two">
            <article class="panel">
              <div class="section-head compact">
                <div>
                  <p class="eyebrow">Heat Map</p>
                  <h2>龙头板块</h2>
                </div>
              </div>
              <div id="sectorBars" class="sector-bars"></div>
            </article>

            <article class="panel">
              <div class="section-head compact">
                <div>
                  <p class="eyebrow">Company Reports</p>
                  <h2>最近公司报告</h2>
                </div>
              </div>
              <div id="companyReports" class="report-list"></div>
            </article>
          </div>

          <article class="panel">
            <div class="section-head compact">
              <div>
                <p class="eyebrow">Leader Pool</p>
                <h2>龙头股观察池</h2>
              </div>
              <div class="search-box">
                <svg><use href="#i-search"></use></svg>
                <input id="stockFilter" type="search" placeholder="筛选板块或代码" />
              </div>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>板块</th>
                    <th>候选龙头</th>
                    <th>触发线索</th>
                    <th>风险观察</th>
                    <th>策略框架</th>
                  </tr>
                </thead>
                <tbody id="leaderRows"></tbody>
              </table>
            </div>
          </article>

          <div class="grid-two">
            <article class="panel">
              <div class="section-head compact">
                <div>
                  <p class="eyebrow">Trading Frame</p>
                  <h2>操作建议</h2>
                </div>
              </div>
              <div id="tradePlan" class="plan-box"></div>
            </article>

            <article class="panel">
              <div class="section-head compact">
                <div>
                  <p class="eyebrow">Risk Controls</p>
                  <h2>风控清单</h2>
                </div>

async function updateOnlineNews({ manual }) {
  const selectedDate = parseDateInput(elements.tradeDate.value);
  const isFuture = selectedDate > startOfDay(new Date());
  if (isFuture) {
    setUpdateStatus("未来日期无法联网更新");
    return;
  }

  elements.onlineBtn.disabled = true;
  setUpdateStatus(manual ? "正在联网更新..." : "每日自动更新中...");

  try {
    const articles = await fetchOnlineArticles(selectedDate);
    if (!articles.length) {
      throw new Error("No usable articles");
    }

    const newsText = composeOnlineNews(articles);
    elements.newsInput.value = newsText;
    localStorage.setItem(getCacheKey(), newsText);
    localStorage.setItem(getLinkCacheKey(), JSON.stringify(currentLinkMap));
    localStorage.setItem("china-market-signal-last-auto-key", getCacheKey());
    setUpdateStatus(`联网更新成功：${articles.length}条｜${formatTime(new Date())}`);
    analyze();
  } catch (error) {
    const cached = localStorage.getItem(getCacheKey());
    if (cached) {
      currentLinkMap = loadLinkMap();
      elements.newsInput.value = cached;
      analyze();
      setUpdateStatus(`联网失败，使用缓存｜${formatTime(new Date())}`);
    } else {
      setUpdateStatus("联网失败，保留示例/手动输入");
    }
  } finally {
    elements.onlineBtn.disabled = false;
  }
}

async function fetchOnlineArticles(date) {
  const settled = await Promise.allSettled([fetchGdeltArticles(date), fetchRssArticles(date)]);
  const articles = settled.flatMap((item) => (item.status === "fulfilled" ? item.value : []));
  const seen = new Set();

  return articles
    .filter((article) => article.title)
    .filter((article) => {
      const key = article.url || article.link || article.title;
      if (seen.has(key)) return false;
      seen.add(key);
      return true;
    })
    .slice(0, 42);
}

async function fetchGdeltArticles(date) {
  const start = formatGdeltDate(date, "000000");
  const end = formatGdeltDate(date, "235959");
  const requests = onlineQueries.map((query) => {
    const url = new URL("https://api.gdeltproject.org/api/v2/doc/doc");
    url.searchParams.set("query", query);
    url.searchParams.set("mode", "ArtList");
    url.searchParams.set("format", "json");
    url.searchParams.set("maxrecords", "18");
    url.searchParams.set("sort", "HybridRel");
    url.searchParams.set("startdatetime", start);
    url.searchParams.set("enddatetime", end);
    return fetch(url.toString(), { cache: "no-store" }).then((response) => {
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      return response.json();
    });
  });

  const settled = await Promise.allSettled(requests);
  const articles = settled.flatMap((item) => (item.status === "fulfilled" && item.value.articles ? item.value.articles : []));

  return articles
    .filter((article) => article.title)
    .slice(0, 36);
}

async function fetchRssArticles(date) {
  const next = new Date(date);
  next.setDate(next.getDate() + 1);
  const requests = onlineQueries.map((query) => {
    const rss = new URL("https://news.google.com/rss/search");
    rss.searchParams.set("q", `${query} after:${formatIsoDate(date)} before:${formatIsoDate(next)}`);
    rss.searchParams.set("hl", "zh-CN");
    rss.searchParams.set("gl", "CN");
    rss.searchParams.set("ceid", "CN:zh-Hans");

    const url = new URL("https://api.rss2json.com/v1/api.json");
    url.searchParams.set("rss_url", rss.toString());
    return fetch(url.toString(), { cache: "no-store" }).then((response) => {
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      return response.json();
    });
  });

  const settled = await Promise.allSettled(requests);
  return settled
    .flatMap((item) => (item.status === "fulfilled" && item.value.items ? item.value.items : []))
    .filter((item) => item.title)
    .map((item) => ({
      title: getRssTitle(item),
      seendate: item.pubDate,
      domain: getRssDomain(item),
      url: item.link,
    }))
    .slice(0, 36);
}

function composeOnlineNews(articles) {
  currentLinkMap = {};
  const lines = articles.map((article, index) => {
    const date = article.seendate ? article.seendate.replace("T", " ").replace("Z", "") : "今日";
    const domain = article.domain || article.sourceCollectionIdentifier || "online";
    const title = article.title.replace(/\s+/g, " ").trim();
    const url = article.url || article.link || "";
    const marker = `N${index + 1}`;
    if (url) currentLinkMap[marker] = url;
    return `${index + 1}. ${date}｜${domain}：${title}${url ? `｜↗${index + 1}` : ""}`;
  });

  return `联网新闻更新（${formatChineseDate(parseDateInput(elements.tradeDate.value))}）\n${lines.join("\n")}`;
}

function loadLinkMap() {

function compactInlineLinks(text) {
  let nextIndex = Object.keys(currentLinkMap).length + 1;
  return text.replace(/(?:｜?链接：)?(https?:\/\/[^\s｜|）)】]+)/gi, (match, url) => {
    const existing = Object.entries(currentLinkMap).find(([, savedUrl]) => savedUrl === url);
    const marker = existing ? existing[0] : `N${nextIndex++}`;
    currentLinkMap[marker] = url;
    return `｜↗${marker.replace("N", "")}`;
  });
}

function analyze() {
  const text = elements.newsInput.value.trim();
  const activeSources = getActiveSources();

  if (!text) {
    lastResult = null;
    renderEmptyState();
    return;
  }

  const sourceWeight = activeSources.reduce((sum, source) => sum + source.weight, 0) / Math.max(activeSources.length, 1);
  const sentences = splitSentences(text);
  const policyScore = keywordScore(text, positiveKeywords) * sourceWeight;
  const riskScore = keywordScore(text, riskKeywords);
  const liquidityScore = keywordScore(text, liquidityKeywords) * 1.08;

  const rankedSectors = sectors
    .map((sector) => {
      const direct = keywordScore(text, sector.keywords);
      const sentenceHits = sentences.filter((sentence) => sector.keywords.some((keyword) => includesTerm(sentence, keyword)));
      const sourceBoost = sector.name === "券商金融" && includesAny(text, ["活跃资本市场", "并购重组", "交易量"]) ? 1.2 : 0;
      const policyBoost = sentenceHits.some((sentence) => includesAny(sentence, positiveKeywords)) ? 0.8 : 0;
      const score = clamp(Math.round((direct * 16 + policyBoost * 12 + sourceBoost * 10) * sourceWeight), 0, 100);
      return {
        ...sector,
        score,
        hits: sentenceHits.slice(0, 3),
      };
    })
    .sort((a, b) => b.score - a.score);

  const top = rankedSectors.slice(0, 5);
  const breadth = rankedSectors.filter((sector) => sector.score >= 36).length;
  const concentration = top[0]?.score - top[4]?.score || 0;
  const marketScore = clamp(
    Math.round(47 + policyScore * 3.1 + liquidityScore * 2.4 + breadth * 1.8 - riskScore * 2.8 - Math.max(concentration - 42, 0) * 0.18),
    0,
    100,
  );

  const scenario = buildScenario(marketScore, riskScore, liquidityScore, breadth);
  const topics = buildTopics(sentences, rankedSectors);

  lastResult = {
    text,
    date: elements.tradeDate.value,
    marketScore,
    policyScore,
    riskScore,
    liquidityScore,
    sectors: rankedSectors,
    topics,
    scenario,
    tradePlan: buildTradePlan(marketScore, riskScore, top),
    risks: buildRisks(riskScore, top, text),
  };

  renderResult(lastResult);
}

function getActiveSources() {
  const checked = [...elements.sourceGrid.querySelectorAll("input:checked")].map((input) => input.value);
  return sources.filter((source) => checked.includes(source.id));
}

function splitSentences(text) {
  return text
    .split(/\n+/)
    .flatMap((line) => {
      const trimmed = line.trim();
      if (!trimmed) return [];
      if (extractLink(trimmed)) return [trimmed];
      return trimmed.split(/[。；;!?！？]+/);
    })
    .map((item) => item.trim())
    .filter(Boolean)
    .slice(0, 80);
}

function keywordScore(text, keywords) {
  return keywords.reduce((sum, keyword) => sum + countTerm(text, keyword), 0);
}

function countTerm(text, term) {
  const escaped = term.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  const matches = text.match(new RegExp(escaped, "gi"));
  return matches ? matches.length : 0;
}

function includesTerm(text, term) {
  return text.toLowerCase().includes(term.toLowerCase());
}

function includesAny(text, list) {
  return list.some((term) => includesTerm(text, term));
}

function extractLink(text) {
  const match = text.match(/https?:\/\/[^\s｜|）)】]+/i);
  if (match) return match[0];
  const marker = text.match(/↗\s*(\d+)/);
  return marker ? currentLinkMap[`N${marker[1]}`] || "" : "";
}

function cleanNewsSentence(text) {
  return text
    .replace(/｜?链接：https?:\/\/[^\s｜|）)】]+/i, "")
    .replace(/https?:\/\/[^\s｜|）)】]+/i, "")
    .replace(/｜?↗\s*\d+/g, "")
    .replace(/\s+/g, " ")
    .trim();
}

function normalizeUrl(url) {
  const trimmed = url.trim();
  if (!/^https?:\/\//i.test(trimmed)) return "";
  return trimmed;
}

function buildScenario(score, risk, liquidity, breadth) {
  const baseUp = 30 + (score - 50) * 0.58 + liquidity * 2.2 + Math.min(breadth, 8) * 1.2;
  const baseDown = 26 + risk * 3.1 + Math.max(50 - score, 0) * 0.4;
  let up = clamp(Math.round(baseUp), 12, 72);
  let down = clamp(Math.round(baseDown), 10, 62);
  let flat = 100 - up - down;

  if (flat < 18) {
    const borrow = 18 - flat;
    up -= Math.ceil(borrow / 2);
    down -= Math.floor(borrow / 2);
    flat = 18;
  }

  const total = up + flat + down;
  up = Math.round((up / total) * 100);
  down = Math.round((down / total) * 100);
  flat = 100 - up - down;

  return {
    up,
    flat,
    down,
    upText: up >= 48 ? "政策和产业线索共振，适合观察强势板块回踩承接。" : "上涨需要成交额和权重板块继续配合。",
    flatText: flat >= 38 ? "热点轮动概率较高，追高性价比下降。" : "震荡为次要情景，留意盘中分歧。",
    downText: down >= 35 ? "高位题材和外部扰动可能触发获利盘。" : "回撤更多来自短线拥挤，而非主线彻底逆转。",
  };
}

function buildTopics(sentences, rankedSectors) {
  const topics = [];

  sentences.forEach((sentence) => {
    const matched = rankedSectors.find((sector) => sector.keywords.some((keyword) => includesTerm(sentence, keyword)));
    if (!matched) return;

    const weight = matched.score + (includesAny(sentence, positiveKeywords) ? 16 : 0) - (includesAny(sentence, riskKeywords) ? 12 : 0);
    const link = extractLink(sentence);
    const cleanSentence = cleanNewsSentence(sentence);
    topics.push({
      title: cleanSentence.length > 58 ? `${cleanSentence.slice(0, 58)}...` : cleanSentence,
      sector: matched.name,
      url: link,
      timeValue: extractNewsTime(sentence),
      weight,
    });
  });

  const deduped = [];
  const seen = new Set();
  topics
    .sort((a, b) => b.timeValue - a.timeValue || b.weight - a.weight)
    .forEach((topic) => {
      const key = `${topic.title}-${topic.sector}`;
      if (!seen.has(key)) {
        deduped.push(topic);
        seen.add(key);
      }
    });

  return deduped.slice(0, 9);
}

function extractNewsTime(text) {
  const match = text.match(/(\d{4})-(\d{1,2})-(\d{1,2})[ T](\d{1,2}):(\d{1,2})(?::(\d{1,2}))?/);
  if (!match) return 0;
  const [, year, month, day, hour, minute, second = "0"] = match.map(Number);
  return new Date(year, month - 1, day, hour, minute, second).getTime() || 0;
}

function buildTradePlan(score, risk, topSectors) {
  const topNames = topSectors.slice(0, 3).map((sector) => sector.name).join("、") || "高热度主线";

  if (score >= 68 && risk <= 5) {
    return [
      ["仓位节奏", "研究口径可设为五至六成上限，先看开盘量能和前排承接，再决定是否增加暴露。"],
      ["主线选择", `优先跟踪 ${topNames}，只保留新闻催化、成交放大和行业龙头三项同时出现的标的。`],
      ["买卖纪律", "避免一致性高开追价，等待回踩均线、分时缩量企稳或板块二次转强。"],
    ];
  }

  if (score >= 52) {
    return [
      ["仓位节奏", "研究口径以三至五成为主，热点分歧时减少单一题材暴露。"],
      ["主线选择", `围绕 ${topNames} 做强弱比较，选择有政策增量且未明显拥挤的方向。`],
      ["买卖纪律", "优先低吸、轮动和事件确认，不把短线情绪当成基本面兑现。"],
    ];
  }

  return [
    ["仓位节奏", "研究口径以零至三成为主，等待指数、成交额和政策预期重新共振。"],
    ["主线选择", `仅保留 ${topNames} 中相对抗跌、业绩能验证的标的作观察。`],
    ["买卖纪律", "减少追涨和隔夜风险，对高位缩量反抽保持谨慎。"],
  ];
}

function buildRisks(riskScore, topSectors, text) {
  const risks = [
    ["成交验证", "次日若沪深两市成交额无法放大，热点持续性需要下调。"],
    ["前排分歧", "龙头股高开低走或炸板扩散，说明资金从进攻转向兑现。"],
    ["政策兑现", "新闻强度高但公告、订单和资金流没有跟进时，主题可能只适合短线观察。"],
  ];

  if (riskScore >= 4 || includesAny(text, ["出口管制", "制裁", "地缘"])) {
    risks.unshift(["外部扰动", "出口管制、汇率和海外科技链波动会直接压制高估值成长板块。"]);
  }

  if (topSectors.some((sector) => sector.name === "地产基建")) {
    risks.push(["信用风险", "地产链需要同步看销售、融资和地方项目开工，单条政策不等于趋势反转。"]);
  }

  return risks.slice(0, 5);
}

function renderEmptyState() {
  elements.marketScore.textContent = "--";
  elements.marketTone.textContent = "等待研判";
  elements.marketSummary.textContent = "导入新闻后生成情景判断。";
  elements.meterNeedle.style.transform = "translateX(-50%) rotate(-54deg)";
  ["upProb", "flatProb", "downProb"].forEach((id) => (elements[id].textContent = "--"));
  ["upBar", "flatBar", "downBar"].forEach((id) => (elements[id].style.width = "0"));
  ["upText", "flatText", "downText"].forEach((id) => (elements[id].textContent = "--"));
  elements.sectorBars.innerHTML = `<div class="empty">暂无板块热度</div>`;
  elements.hotTopics.innerHTML = `<div class="empty">暂无新闻热点</div>`;
  elements.companyReports.innerHTML = `<div class="empty">暂无公司报告</div>`;
  elements.leaderRows.innerHTML = "";
  elements.tradePlan.innerHTML = `<div class="empty">暂无操作框架</div>`;
  elements.riskList.innerHTML = `<div class="empty">暂无风控清单</div>`;
}

function renderResult(result) {
  const tone = getTone(result.marketScore);
  elements.marketScore.textContent = result.marketScore;
  elements.marketTone.textContent = tone;
  elements.marketSummary.textContent = `政策线索 ${result.policyScore.toFixed(1)}，资金线索 ${result.liquidityScore.toFixed(1)}，风险线索 ${result.riskScore}；主线集中在 ${result.sectors
    .slice(0, 3)
    .map((sector) => sector.name)
    .join("、")}。`;
  elements.meterNeedle.style.transform = `translateX(-50%) rotate(${scoreToNeedle(result.marketScore)}deg)`;

  setProb("up", result.scenario.up, result.scenario.upText);
  setProb("flat", result.scenario.flat, result.scenario.flatText);
  setProb("down", result.scenario.down, result.scenario.downText);

  renderSectorBars(result.sectors);
  renderTopics(result.topics);
  renderCompanyReports(result.sectors);
  renderLeaderRows(result.sectors);
  renderPlan(result.tradePlan);
  renderRisks(result.risks);
}

function getTone(score) {
  if (score >= 72) return "偏强进攻";
  if (score >= 58) return "偏强震荡";
  if (score >= 44) return "中性轮动";
  return "防守观察";
}

function scoreToNeedle(score) {
  return -58 + (clamp(score, 0, 100) / 100) * 116;
}

function setProb(type, value, text) {
  elements[`${type}Prob`].textContent = `${value}%`;
  elements[`${type}Bar`].style.width = `${value}%`;
  elements[`${type}Text`].textContent = text;
}

function renderSectorBars(rankedSectors) {
  const top = rankedSectors.slice(0, 10);
  elements.sectorBars.innerHTML = top
    .map(
      (sector) => `
        <div class="sector-row">
          <div class="sector-name" title="${sector.name}">${sector.name}</div>
          <div class="bar-track"><span class="bar-fill" style="width:${sector.score}%; background:${sector.color}"></span></div>
          <div class="sector-score">${sector.score}</div>
        </div>
      `,
    )
    .join("");
}

function renderTopics(topics) {
  if (!topics.length) {
    elements.hotTopics.innerHTML = `<div class="empty">未识别到明确产业热点</div>`;
    return;
  }

  elements.hotTopics.innerHTML = topics
    .map(
      (topic) => `
        <div class="topic-item">
          <span class="topic-dot"></span>
          <div>
            <strong>${escapeHtml(topic.title)}${renderSourceAnchor(topic.url)}</strong>
            <div class="topic-meta">
              <span>关联板块：${topic.sector}</span>
            </div>
          </div>
          <span class="chip">${Math.max(Math.round(topic.weight), 1)}</span>
        </div>
      `,
    )
    .join("");
}

function renderCompanyReports(rankedSectors) {
  const reports = buildCompanyReports(rankedSectors);
  if (!reports.length) {
    elements.companyReports.innerHTML = `<div class="empty">暂无公司报告</div>`;
    return;
  }

  elements.companyReports.innerHTML = reports
    .map(
      (report) => `
        <article class="report-item">
          <div class="report-topline">
            <strong>${report.company}</strong>
            <div class="report-actions">
              <span>${report.code}</span>
              ${renderReportLinks(report.links)}
            </div>
          </div>
          <h3>${report.title}</h3>
          <div class="report-meta">
            <span>${report.date}</span>
            <span>${report.sector}</span>
            <span>${report.rating}</span>
          </div>
          <p>${report.summary}</p>
        </article>
      `,
    )
    .join("");
}

function buildCompanyReports(rankedSectors) {
  const date = formatChineseDate(parseDateInput(elements.tradeDate.value));
  return rankedSectors
    .filter((sector) => sector.score > 0)
    .slice(0, 5)
    .flatMap((sector) =>
      sector.leaders.slice(0, 2).map((stock) => {
        const { company, code } = parseStock(stock);
        const rating = sector.score >= 70 ? "重点跟踪" : sector.score >= 42 ? "积极观察" : "中性观察";
        return {
          company,
          code,
          sector: sector.name,
          date,
          rating,
          title: `${company}：${sector.name}景气跟踪与催化验证`,
          summary: `Summary：${company}当前跟随${sector.name}主线，核心看${sector.catalyst}，同时警惕${sector.risk}。`,
          links: buildReportLinks(company, code),
        };
      }),
    )
    .slice(0, 10);
}

function buildReportLinks(company, code) {
  const keyword = `${company} ${code}`.trim();
  return [
    {
      label: "研",
      title: "公司研报",
      url: `https://so.eastmoney.com/web/s?keyword=${encodeURIComponent(`${keyword} 研报`)}`,
    },
    {
      label: "告",
      title: "公司公告",
      url: `https://www.cninfo.com.cn/new/fulltextSearch?notautosubmit=&keyWord=${encodeURIComponent(code || company)}`,
    },
    {
      label: "讯",
      title: "公司资讯",
      url: `https://www.baidu.com/s?wd=${encodeURIComponent(`${keyword} 股票 最新消息`)}`,
    },
  ];
}

function renderReportLinks(links) {
  return links
    .map(
      (link) =>
        `<a class="report-link" href="${escapeHtml(link.url)}" target="_blank" rel="noopener noreferrer" title="${escapeHtml(link.title)}" aria-label="${escapeHtml(link.title)}">${escapeHtml(link.label)}</a>`,
    )
    .join("");
}

function parseStock(stock) {
  const parts = stock.trim().split(/\s+/);
  return {
    company: parts[0] || stock,
    code: parts[1] || "",
  };
}

function renderSourceAnchor(url) {
  const safeUrl = normalizeUrl(url || "");
  if (!safeUrl) return "";
  const escapedUrl = escapeHtml(safeUrl);
  return `<a class="source-mark" href="${escapedUrl}" target="_blank" rel="noopener noreferrer" title="打开原文" aria-label="打开原文">↗</a>`;
}

function renderLeaderRows(rankedSectors) {
  const filter = elements.stockFilter.value.trim().toLowerCase();
  const rows = rankedSectors
    .filter((sector) => sector.score > 0)
    .filter((sector) => {
      if (!filter) return true;
      return `${sector.name} ${sector.leaders.join(" ")}`.toLowerCase().includes(filter);
    })
    .slice(0, 8);

  if (!rows.length) {
    elements.leaderRows.innerHTML = `<tr><td colspan="5" class="empty">没有匹配结果</td></tr>`;
    return;
  }

  elements.leaderRows.innerHTML = rows
    .map(
      (sector) => `
        <tr>
          <td><strong>${sector.name}</strong><br><span class="chip">热度 ${sector.score}</span></td>
          <td><div class="stock-tags">${sector.leaders.map((stock) => `<span class="stock-tag">${stock}</span>`).join("")}</div></td>
          <td>${sector.catalyst}</td>
          <td>${sector.risk}</td>
          <td>${buildSectorStrategy(sector)}</td>
        </tr>
      `,
    )
    .join("");
}

function buildSectorStrategy(sector) {
  if (sector.score >= 70) return "强催化方向；等待分歧承接和成交确认，避免无量高开追价。";
  if (sector.score >= 42) return "轮动候选；只看前排辨识度和业绩线索，降低持仓时间预期。";
  return "低优先级；新闻强度不足，除非盘面主动放量转强。";
}

function renderPlan(items) {
  elements.tradePlan.innerHTML = items
    .map(
      ([title, body]) => `
        <div class="plan-item">
          <strong>${title}</strong>
          <span>${body}</span>
        </div>
      `,
    )
    .join("");
}

function renderRisks(items) {
  elements.riskList.innerHTML = items
    .map(
      ([title, body]) => `
        <div class="risk-item">
          <strong>${title}</strong>
          <span>${body}</span>
        </div>
      `,
    )
    .join("");
}

function exportReport() {
  if (!lastResult) {
    return;
  }

  const lines = [
    `A股新闻热度研判台 - ${lastResult.date}`,
    `市场温度：${lastResult.marketScore} / ${getTone(lastResult.marketScore)}`,
    `情景概率：上涨 ${lastResult.scenario.up}%｜震荡 ${lastResult.scenario.flat}%｜回撤 ${lastResult.scenario.down}%`,
    "",
    "龙头板块：",
    ...lastResult.sectors.slice(0, 6).map((sector, index) => `${index + 1}. ${sector.name} ${sector.score}分 - ${sector.catalyst}`),
    "",
    "操作框架：",
    ...lastResult.tradePlan.map(([title, body]) => `- ${title}：${body}`),
    "",
    "风控清单：",
    ...lastResult.risks.map(([title, body]) => `- ${title}：${body}`),
    "",
    "提示：本报告由本地规则模型生成，仅供研究复盘，不构成投资建议。",
  ];

  const blob = new Blob([lines.join("\n")], { type: "text/plain;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.href = url;
  link.download = `market-signal-${lastResult.date || "report"}.txt`;
  document.body.appendChild(link);
  link.click();
  link.remove();
  URL.revokeObjectURL(url);
}

function debounce(fn, delay) {
  let timer;
  return (...args) => {
    window.clearTimeout(timer);
    timer = window.setTimeout(() => fn(...args), delay);
  };
}

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function parseDateInput(value) {
  if (!value) return startOfDay(new Date());
  const [year, month, day] = value.split("-").map(Number);
  return new Date(year, month - 1, day);
}

function getTodayInput() {
  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = String(today.getMonth() + 1).padStart(2, "0");
  const dd = String(today.getDate()).padStart(2, "0");
  return `${yyyy}-${mm}-${dd}`;
}

function startOfDay(date) {
  return new Date(date.getFullYear(), date.getMonth(), date.getDate());
}

function getNextTradeDate(date) {
  const next = new Date(date);
  next.setDate(next.getDate() + 1);
  while (next.getDay() === 0 || next.getDay() === 6) {
    next.setDate(next.getDate() + 1);
  }
  return next;
}

function formatChineseDate(date) {
  const weekday = ["周日", "周一", "周二", "周三", "周四", "周五", "周六"][date.getDay()];
  return `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日 ${weekday}`;
}

function formatGdeltDate(date, time) {
  const yyyy = date.getFullYear();
  const mm = String(date.getMonth() + 1).padStart(2, "0");
  const dd = String(date.getDate()).padStart(2, "0");
  return `${yyyy}${mm}${dd}${time}`;
}

function formatIsoDate(date) {
  const yyyy = date.getFullYear();
  const mm = String(date.getMonth() + 1).padStart(2, "0");
  const dd = String(date.getDate()).padStart(2, "0");
  return `${yyyy}-${mm}-${dd}`;
}

function formatTime(date) {
  const hh = String(date.getHours()).padStart(2, "0");
  const mm = String(date.getMinutes()).padStart(2, "0");
  return `${hh}:${mm}`;
}

function stripHtml(value) {
  const div = document.createElement("div");
  div.innerHTML = value;
  return (div.textContent || div.innerText || value).replace(/\s+/g, " ").trim();
}

function getRssDomain(item) {
  const cleanTitle = stripHtml(item.title || "");
  const sourceFromTitle = cleanTitle.includes(" - ") ? cleanTitle.split(" - ").pop() : "";
  if (sourceFromTitle) return sourceFromTitle;
  try {
    return new URL(item.link).hostname.replace(/^www\./, "");
  } catch (error) {
    return "Google News";
  }
}

function getRssTitle(item) {
  const cleanTitle = stripHtml(item.title || "");
  if (!cleanTitle.includes(" - ")) return cleanTitle;
  return cleanTitle.split(" - ").slice(0, -1).join(" - ");
}

function escapeHtml(value) {
  return value.replace(/[&<>"']/g, (char) => {
    const map = {
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#039;",
    };
    return map[char];
  });
}
